<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Live Paris OSINT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Prevent page scroll */
        }

        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
            cursor: crosshair; 
        }

        /* --- LEFT PANEL: TACTICAL CONTROLS --- */
        .overlay-box {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.85);
            border-left: 4px solid #ff0000;
            padding: 15px 20px;
            color: #fff;
            z-index: 1000;
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 2px;
        }

        .overlay-box h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .status {
            font-size: 14px;
            color: #00ff00;
            margin-top: 5px;
        }
        
        .control-panel, .route-panel {
            margin-top: 15px; 
            border-top: 1px solid #333; 
            padding-top: 12px;
        }

        .rte-input {
            width: 90%;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            margin-bottom: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .rte-input:focus { outline: none; }

        .btn-calc {
            width: 96%;
            background: #0055ff;
            border: 1px solid #0096ff;
            color: #fff;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-calc:hover { background: #0096ff; }

        #rte-result {
            margin-top: 10px;
            font-size: 12px;
            display: none;
            padding: 10px;
            line-height: 1.4;
        }

        /* --- RIGHT PANEL: LIVE INTELLIGENCE FEED --- */
        .log-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: calc(100vh - 40px); /* Fits screen height perfectly */
            background: rgba(10, 10, 10, 0.85);
            border-right: 4px solid #00d4ff;
            color: #fff;
            z-index: 1000;
            pointer-events: auto;
            box-shadow: -4px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .log-header {
            padding: 15px;
            background: #111;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00d4ff;
            text-align: right;
        }

        .log-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Hacker-style custom scrollbar */
        .log-content::-webkit-scrollbar { width: 4px; }
        .log-content::-webkit-scrollbar-track { background: #000; }
        .log-content::-webkit-scrollbar-thumb { background: #444; }

        .log-entry {
            background: #1a1a1a;
            border-left: 3px solid;
            padding: 10px;
            font-size: 11px;
            line-height: 1.4;
            cursor: pointer;
            animation: slideIn 0.3s ease-out;
            transition: background 0.2s;
        }
        .log-entry:hover { background: #2a2a2a; }

        .log-entry.high { border-color: #ff0000; color: #ffdddd; }
        .log-entry.medium { border-color: #ffa500; color: #ffeedd; }
        .log-entry.low { border-color: #0096ff; color: #ddf0ff; }
        
        .log-time {
            font-size: 9px;
            color: #888;
            margin-bottom: 5px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- THE NEW TACTICAL RADAR PINS --- */
        .osint-marker { border-radius: 50%; border: 2px solid white; }
        .severity-high { background-color: rgba(255, 0, 0, 0.8); box-shadow: 0 0 10px red; animation: pulse-high 1.2s infinite; }
        .severity-medium { background-color: rgba(255, 165, 0, 0.8); box-shadow: 0 0 10px orange; animation: pulse-medium 2s infinite; }
        .severity-low { background-color: rgba(0, 150, 255, 0.8); box-shadow: 0 0 10px #0096ff; }

        @keyframes pulse-high { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
        @keyframes pulse-medium { 0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 165, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); } }

        .leaflet-popup-content-wrapper { background: #111; color: #fff; border: 1px solid #333; }
        .leaflet-popup-tip { background: #111; }
        .transit-tooltip { background: rgba(10, 10, 10, 0.9); border: 1px solid #444; color: #fff; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

    <div class="overlay-box">
        <h1>Grey Lane | Paris OSINT</h1>
        <div class="status" id="status-text">Connecting to intelligence feed...</div>
        
        <div class="control-panel">
            <label style="cursor: pointer; display: flex; align-items: center; font-size: 13px; color: #aaa;">
                <input type="checkbox" id="tog-transit" onchange="toggleTransit(this.checked)" style="margin-right: 10px;">
                [X] ENABLE TRANSIT GRID
            </label>
        </div>

        <div class="route-panel">
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">ROUTE SAFETY ENGINE</div>
            <input type="text" id="rte-from" class="rte-input" placeholder="Origin (Click Map)" readonly style="border-color: #00d4ff;">
            <input type="text" id="rte-to" class="rte-input" placeholder="Destination (Click Map)" readonly>
            <button class="btn-calc" onclick="calculateRoute()">▶ RUN THREAT SCAN</button>
            <div id="rte-result"></div>
        </div>
    </div>

    <div class="log-panel">
        <div class="log-header">▶ LIVE INTELLIGENCE LOG</div>
        <div class="log-content" id="log-content">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize Map
        const map = L.map('map', {
            center: [48.8566, 2.3522], 
            zoom: 13,
            zoomControl: false
        });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // --- TRANSIT OVERLAY LOGIC ---
        let transitLayer = L.layerGroup(); 
        const METRO_LINES = [
            {name: 'M1', color: '#F2C931', coords: [[48.872,2.284], [48.869,2.308], [48.863,2.332], [48.857,2.349], [48.848,2.396]]},
            {name: 'M4', color: '#A0006E', coords: [[48.891,2.343], [48.876,2.343], [48.858,2.349], [48.825,2.332]]},
            {name: 'M6', color: '#83C491', coords: [[48.845,2.282], [48.848,2.306], [48.851,2.330], [48.851,2.400]]},
            {name: 'M13', color: '#6EC4E8', coords: [[48.916,2.329], [48.903,2.338], [48.883,2.338], [48.860,2.332], [48.818,2.296]]},
            {name: 'RER A', color: '#D00000', coords: [[48.870,2.209], [48.865,2.287], [48.858,2.350], [48.850,2.440], [48.835,2.520]]},
            {name: 'RER B', color: '#4169E1', coords: [[48.944,2.357], [48.900,2.350], [48.860,2.347], [48.810,2.321], [48.760,2.310]]},
        ];

        function toggleTransit(isOn) {
            if (isOn) {
                transitLayer.clearLayers(); 
                METRO_LINES.forEach(l => L.polyline(l.coords, {color: l.color, weight: 4, opacity: 0.85}).addTo(transitLayer).bindTooltip(l.name, {sticky: true, className: 'transit-tooltip'}));
                map.addLayer(transitLayer);
            } else { map.removeLayer(transitLayer); }
        }

        // --- ROUTE ENGINE ---
        let activeIncidents = []; 
        let routeLayer = L.layerGroup().addTo(map);
        let inputMode = 'from', coordFrom = null, coordTo = null;

        map.on('click', function(e) {
            const ll = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            if (inputMode === 'from') {
                coordFrom = [e.latlng.lat, e.latlng.lng];
                document.getElementById('rte-from').value = "🎯 " + ll;
                inputMode = 'to';
                document.getElementById('rte-from').style.borderColor = '#444';
                document.getElementById('rte-to').style.borderColor = '#00d4ff';
            } else if (inputMode === 'to') {
                coordTo = [e.latlng.lat, e.latlng.lng];
                document.getElementById('rte-to').value = "🎯 " + ll;
                inputMode = null;
                document.getElementById('rte-to').style.borderColor = '#444';
            }
        });

        document.getElementById('rte-from').onclick = () => { inputMode = 'from'; document.getElementById('rte-from').style.borderColor = '#00d4ff'; document.getElementById('rte-to').style.borderColor = '#444'; };
        document.getElementById('rte-to').onclick = () => { inputMode = 'to'; document.getElementById('rte-to').style.borderColor = '#00d4ff'; document.getElementById('rte-from').style.borderColor = '#444'; };

        function calculateRoute() {
            if (!coordFrom || !coordTo) return alert("Please click on the map to set Origin and Destination.");
            routeLayer.clearLayers();
            const resBox = document.getElementById('rte-result');
            resBox.style.display = 'block';

            const routeLine = L.polyline([coordFrom, coordTo], {color: '#00d4ff', weight: 3, dashArray: '8,5'}).addTo(routeLayer);
            L.circleMarker(coordFrom, {radius: 6, color: '#00d4ff', fillOpacity: 0.8}).addTo(routeLayer);
            L.circleMarker(coordTo, {radius: 6, color: '#ff4757', fillOpacity: 0.8}).addTo(routeLayer);
            map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});

            const dangerZone = routeLine.getBounds().pad(0.015);
            const threatsOnRoute = activeIncidents.filter(h => dangerZone.contains([h.lat, h.lng]));

            if (threatsOnRoute.length === 0) {
                resBox.style.background = 'rgba(0, 255, 0, 0.1)'; resBox.style.border = '1px solid #00ff00'; resBox.style.color = '#00ff00';
                resBox.innerHTML = '✓ PATH CLEAR.<br>No live threats detected.';
            } else {
                resBox.style.background = 'rgba(255, 0, 0, 0.1)'; resBox.style.border = '1px solid #ff4757'; resBox.style.color = '#ff4757';
                resBox.innerHTML = `⚠ WARNING: <b>${threatsOnRoute.length} hazard(s)</b> detected.<br><br>Alternative detour plotted.`;
                const bypassMid = [((coordFrom[0] + coordTo[0]) / 2) + 0.01, ((coordFrom[1] + coordTo[1]) / 2) + 0.01];
                L.polyline([coordFrom, bypassMid, coordTo], {color: '#2ed573', weight: 4, dashArray: '5,5'}).addTo(routeLayer).bindTooltip("DETOUR", {permanent: true, className: 'transit-tooltip'});
            }
        }

        // --- BACKEND WEBSOCKET & LOG UI ---
        const wsUrl = "wss://grey-lane-osint-dashboard.onrender.com/ws";
        const ws = new WebSocket(wsUrl);
        const statusText = document.getElementById("status-text");
        const logContent = document.getElementById("log-content");

        ws.onopen = function() { statusText.innerHTML = "Backend: Live & Connected"; statusText.style.color = "#00ff00"; };
        ws.onclose = function() { statusText.innerHTML = "Backend: Disconnected (Reconnecting...)"; statusText.style.color = "#ff0000"; };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.event === "new_incident") {
                const inc = data.incident;
                activeIncidents.push(inc);
                if(activeIncidents.length > 50) activeIncidents.shift(); 
                
                // 1. Draw Map Marker
                let sevClass = inc.severity.toLowerCase() === "high" ? "severity-high" : (inc.severity.toLowerCase() === "medium" ? "severity-medium" : "severity-low");
                const marker = L.marker([inc.lat, inc.lng], { icon: L.divIcon({className: `osint-marker ${sevClass}`, iconSize: [14, 14], iconAnchor: [7, 7]}) }).addTo(map);
                marker.bindPopup(`<div style="font-family: monospace;"><strong style="color: #ff4444;">[ ${inc.category} ]</strong><br><br>${inc.description}</div>`);

                // 2. Add to Sidebar Log
                const timeString = new Date().toLocaleTimeString([], { hour12: false });
                
                // Extract just the bold title for the sidebar so it isn't too huge
                const shortDesc = inc.description.split('<br><br>')[0].replace('<b>', '').replace('</b>', '');

                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${inc.severity.toLowerCase()}`;
                logEntry.innerHTML = `
                    <div class="log-time">[${timeString}] SYSTEM DROP</div>
                    <strong style="color: #fff;">[ ${inc.category} ]</strong><br>
                    ${shortDesc}
                `;
                
                // Click-to-Fly Feature
                logEntry.onclick = () => {
                    map.flyTo([inc.lat, inc.lng], 16, { animate: true, duration: 1.5 });
                    marker.openPopup();
                };

                // Add to top of list, remove oldest if over 50
                logContent.prepend(logEntry);
                if (logContent.children.length > 50) logContent.removeChild(logContent.lastChild);
            }
        };
    </script>
</body>
</html>
