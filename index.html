<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Live Paris OSINT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- LEFT PANEL STRUCTURE --- */
        :root {
            --panel-w: 310px;
            --cat-a: #ff4444;
            --cat-b: #ff8800;
            --cat-c: #ffcc00;
            --cat-d: #00d2ff;
            --cat-e: #ff00ff;
            --border: #333;
        }

        #map {
            width: calc(100% - var(--panel-w));
            height: calc(100vh - 55px - 65px);
            z-index: 1;
            cursor: crosshair;
            position: fixed;
            top: 55px;
            left: var(--panel-w);
        }

        .panel {
            position: fixed;
            top: 55px;
            left: 0;
            width: var(--panel-w);
            height: calc(100vh - 55px - 65px);
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid #333;
            overflow-y: auto;
            z-index: 999;
            padding: 0;
        }

        /* --- RIGHT PANEL SPLIT FIX --- */
        .log-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: calc(100vh - 40px - 65px);
            background: rgba(10, 10, 10, 0.85);
            border-right: 4px solid #00d4ff;
            color: #fff;
            z-index: 1000;
            pointer-events: auto;
            box-shadow: -4px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .log-header {
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: right;
        }

        .log-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Set explicit 50% heights so they don't crush each other */
        #news-section { height: 50%; display: flex; flex-direction: column; border-bottom: 2px solid #333; }
        #transit-section { height: 50%; display: flex; flex-direction: column; }

        .log-content::-webkit-scrollbar { width: 4px; }
        .log-content::-webkit-scrollbar-track { background: #000; }
        .log-content::-webkit-scrollbar-thumb { background: #444; }

        .log-entry {
            background: #1a1a1a;
            border-left: 3px solid;
            padding: 10px;
            font-size: 11px;
            line-height: 1.4;
            cursor: pointer;
            animation: slideIn 0.3s ease-out;
            transition: background 0.2s;
        }
        .log-entry:hover { background: #2a2a2a; }

        .log-entry.high { border-color: #ff0000; color: #ffdddd; }
        .log-entry.medium { border-color: #ffa500; color: #ffeedd; }
        .log-entry.low { border-color: #0096ff; color: #ddf0ff; }
        .log-entry.transit { border-color: #00d2ff; color: #ddeeff; }
        
        .log-time { font-size: 9px; color: #888; margin-bottom: 5px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .osint-marker { border-radius: 50%; border: 2px solid white; }
        .severity-high { background-color: rgba(255, 0, 0, 0.8); box-shadow: 0 0 10px red; animation: pulse-high 1.2s infinite; }
        .severity-medium { background-color: rgba(255, 165, 0, 0.8); box-shadow: 0 0 10px orange; animation: pulse-medium 2s infinite; }
        .severity-low { background-color: rgba(0, 150, 255, 0.8); box-shadow: 0 0 10px #0096ff; }

        @keyframes pulse-high { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
        @keyframes pulse-medium { 0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 165, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); } }

        .leaflet-popup-content-wrapper { background: #111; color: #fff; border: 1px solid #333; }
        .leaflet-popup-tip { background: #111; }

        .psec { padding: 16px; border-bottom: 1px solid var(--border); }
        .stitle { font-family: monospace; font-size: 12px; font-weight: bold; color: #00d2ff; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }

        /* Category Toggles */
        .ctog { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 6px; background: rgba(0, 0, 0, 0.3); border-left: 3px solid transparent; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
        .ctog.active { border-left-color: #00d2ff; background: rgba(0, 210, 255, 0.1); }
        .ctog:hover { background: rgba(255, 255, 255, 0.05); }
        .cdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .cname { font-size: 12px; color: #ddd; flex-grow: 1; font-family: monospace; }
        .ccount { font-size: 11px; color: #888; font-family: monospace; font-weight: bold; }

        .btn { width: 100%; background: #0055ff; border: 1px solid #0096ff; color: #fff; padding: 8px; font-family: monospace; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 2px; transition: all 0.2s; margin-bottom: 8px; }
        .btn:hover { background: #0096ff; }
        
        /* --- COMMAND HEADER STYLING --- */
        #top-header {
            position: fixed; top: 0; left: 0; right: 0; height: 55px;
            background: #0f1218; border-bottom: 1px solid #222d3d;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2000; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        #live-dot { width: 8px; height: 8px; border-radius: 50%; background: #00c851; box-shadow: 0 0 8px #00c851; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 8px #00c851; } 50% { opacity: 0.4; box-shadow: 0 0 2px #00c851; } }
        
        #header-stats { display: flex; align-items: center; gap: 20px; }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-family: monospace; font-size: 18px; color: #ddeeff; font-weight: bold; line-height: 1; }
        .stat-lbl { font-family: monospace; font-size: 9px; color: #8899aa; letter-spacing: 1.5px; margin-top: 2px; }
        .stat-line { width: 1px; height: 25px; background: #222d3d; }
        #header-clock { font-family: monospace; font-size: 13px; color: #00d2ff; letter-spacing: 1px; }

        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: rgba(0,0,0,0.6) !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background: #151a22 !important; color: #00d2ff !important;
            font-family: monospace !important; font-size: 12px !important; font-weight: bold;
            border: 1px solid #00d2ff !important; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* --- PURE FIXED AUTHORITY BOTTOM BAR --- */
        #bottom-authority-bar {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 65px;
            background: #07090c; border-top: 1px solid #1a222d; z-index: 3000;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; gap: 30px;
        }
        .footer-logo-group { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .footer-gl-main { height: 48px; border-right: 1px solid #1a222d; padding-right: 15px; }
        .footer-logo-img { height: 24px; object-fit: contain; opacity: 0.9; border-radius: 2px; }
        .footer-legal-text {
            flex: 1; font-family: monospace; font-size: 8px; color: #556677; line-height: 1.5;
            letter-spacing: 0.5px; text-transform: uppercase; text-align: justify; padding-right: 20px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-left: 1px solid #222; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; box-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }
    </style>
</head>
<body>

    <div id="top-header">
        <div class="header-left">
            <div id="live-dot"></div>
            <div id="logo-block" style="display: flex; align-items: baseline; gap: 6px;">
                <span style="color: #8899aa; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;">GREY</span> 
                <span style="color: #8899aa; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;">LANE</span>
                <span style="color: #ff2d78; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-left: 6px;">PARIS</span>
                <span style="color: #00d2ff; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;">OSINT</span>
            </div>
        </div>
        <div id="header-stats">
            <div class="stat-box"><div class="stat-val" id="stat-active">0</div><div class="stat-lbl">ACTIVE</div></div>
            <div class="stat-line"></div>
            <div class="stat-box"><div class="stat-val" style="color: #ff4444;" id="stat-crit">0</div><div class="stat-lbl">CRITICAL</div></div>
            <div class="stat-line"></div>
            <div class="stat-box"><div class="stat-val" id="stat-transit-cnt">0</div><div class="stat-lbl">TRANSIT</div></div>
        </div>
        <div id="header-clock">--:--:-- CET</div>
    </div>

    <div id="panel-left" class="panel">

      <div class="psec">
        <div class="stitle">Categories</div>
        <div class="ctog active"><div class="cdot" style="background:var(--cat-a)"></div><div class="cname">Intel & News</div><div class="ccount" id="cA">0</div></div>
        <div class="ctog active"><div class="cdot" style="background:var(--cat-b)"></div><div class="cname">Hazard & Damage</div><div class="ccount" id="cB">0</div></div>
        <div class="ctog active"><div class="cdot" style="background:var(--cat-c)"></div><div class="cname">Street Crime</div><div class="ccount" id="cC">0</div></div>
        <div class="ctog active"><div class="cdot" style="background:var(--cat-e)"></div><div class="cname">High Security</div><div class="ccount" id="cE">0</div></div>
        <div class="ctog active"><div class="cdot" style="background:var(--cat-d)"></div><div class="cname">Transit Alerts</div><div class="ccount" id="cD">0</div></div>
      </div>
    </div>

    <div class="log-panel">
        <div id="news-section">
            <div class="log-header" style="color: #ffaa00;">🚨 LIVE BREAKING NEWS</div>
            <div class="log-content" id="news-log-content"></div>
        </div>

        <div id="transit-section">
            <div class="log-header" style="color: #00d2ff; border-top: none;">🚇 TRANSIT ALERTS</div>
            <div class="log-content" id="transit-log-content"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    
    <script>
        // BACKEND URL
        const BACKEND_URL = "https://greylane-grey-lane-osint-backend.hf.space";
        let ws;

        const map = L.map('map', { center: [48.8566, 2.3522], zoom: 13, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // LIVE CLOCK
        setInterval(() => {
            const now = new Date();
            document.getElementById('header-clock').innerText = now.toLocaleTimeString('fr-FR', {timeZone: 'Europe/Paris', hour12: false}) + ' CET';
        }, 1000);

        // CLUSTER GROUP
        const masterCluster = L.markerClusterGroup({ maxClusterRadius: 40 });
        map.addLayer(masterCluster);

        let activeIncidents = []; 

        async function loadExistingIncidents() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/incidents`);
                const result = await response.json();
                if (result.status === "success") {
                    result.data.forEach(inc => processIncidentData(inc));
                }
            } catch (error) { console.error("Failed preload:", error); }
        }

        const wsUrl = `wss://${BACKEND_URL.replace('https://', '')}/ws`;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            ws.onopen = function() { 
                document.getElementById("live-dot").style.background = "#00c851";
                loadExistingIncidents();
            };
            ws.onclose = function() { 
                document.getElementById("live-dot").style.background = "#ff4444";
                setTimeout(connectWebSocket, 5000);
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.event === "new_incident") {
                    processIncidentData(data.incident);
                }
            };
        }

        connectWebSocket();

        // MASTER FUNCTION TO FIX DUPLICATES & STACKING
        function processIncidentData(inc) {
            // FIX 1: Prevent duplicates from stacking and crashing the cluster
            let isDuplicate = activeIncidents.some(existing => existing.lat === inc.lat && existing.lng === inc.lng && existing.category === inc.category);
            if (isDuplicate) return; 

            // Track safe arrays
            activeIncidents.push(inc);
            
            // CLEANUP ENGINE: If we have more than 150 incidents total, wipe the oldest marker off the map!
            if(activeIncidents.length > 150) {
                let oldInc = activeIncidents.shift();
                if (oldInc.mapMarker) {
                    if (oldInc.category === 'TRANSIT') {
                        masterCluster.removeLayer(oldInc.mapMarker);
                    } else {
                        map.removeLayer(oldInc.mapMarker);
                    }
                }
            }

            // Stats Update
            document.getElementById('stat-active').innerText = activeIncidents.length;
            document.getElementById('stat-transit-cnt').innerText = activeIncidents.filter(i => i.category === 'TRANSIT').length;
            
            let rawSev = String(inc.severity || "low").toLowerCase();
            let isHigh = rawSev.includes("high") || rawSev.includes("5") || rawSev.includes("4");
            let isMed = rawSev.includes("medium") || rawSev.includes("3") || rawSev.includes("warning");
            
            document.getElementById('stat-crit').innerText = activeIncidents.filter(item => String(item.severity).toLowerCase().includes("high") || String(item.severity).includes("5")).length;

            // Marker Styling
            let isTransit = (inc.category === 'TRANSIT');
            let mSize = isTransit ? 12 : (isHigh ? 12 : (isMed ? 10 : 8));
            let markerColor = isTransit ? '#00d2ff' : (isHigh ? '#ff2d78' : (isMed ? '#ffa502' : '#2ed573'));
            let sevClass = isHigh ? "severity-high" : (isMed ? "severity-medium" : "severity-low");
            
            let customHtml = isTransit 
                ? '<div style="width: 100%; height: 100%; background: rgba(0, 210, 255, 0.2); border: 1.5px solid #00d2ff; border-radius: 50%; box-shadow: 0 0 5px #00d2ff;"></div>'
                : `<div style="width: 100%; height: 100%; background: ${markerColor}; opacity: 0.9; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 8px ${markerColor};"></div>`;

            const marker = L.marker([inc.lat, inc.lng], { 
                icon: L.divIcon({ className: `osint-marker ${sevClass}`, html: customHtml, iconSize: [mSize, mSize], iconAnchor: [mSize/2, mSize/2] }) 
            });
            
            marker.bindPopup(`<div style="font-family: monospace;"><strong style="color: #ff4444;">[ ${inc.category} ]</strong><br><br>${inc.description}</div>`);
            
            // Attach marker reference so we can delete it later
            inc.mapMarker = marker;

            if (isTransit) { marker.addTo(masterCluster); } else { marker.addTo(map); }

            // FIX 2: SPLIT THE LOGS INTO THE RIGHT PANELS
            const timeString = new Date().toLocaleTimeString([], { hour12: false });
            const shortDesc = (inc.description || "").split('<br><br>')[0].replace('<b>', '').replace('</b>', '');
            
            const logEntry = document.createElement('div');
            let logLevel = isTransit ? 'transit' : (isHigh ? 'high' : (isMed ? 'medium' : 'low'));
            logEntry.className = `log-entry ${logLevel}`;
            logEntry.innerHTML = `<div class="log-time">[${timeString}] SYSTEM DROP</div><strong style="color: #fff;">[ ${inc.category} ]</strong><br>${shortDesc}`;
            
            logEntry.onclick = () => {
                map.flyTo([inc.lat, inc.lng], 15, { animate: true, duration: 1.5 });
                marker.openPopup();
            };

            // Route to correct box
            if (isTransit) {
                const transitLog = document.getElementById("transit-log-content");
                transitLog.prepend(logEntry);
                if (transitLog.children.length > 30) transitLog.removeChild(transitLog.lastChild);
            } else {
                const newsLog = document.getElementById("news-log-content");
                newsLog.prepend(logEntry);
                if (newsLog.children.length > 30) newsLog.removeChild(newsLog.lastChild);
            }

            // Trigger Count Updates
            updateCategoryCounters();
        }

        // FIX 3: RE-MAPPED AI CATEGORY COUNTER
        function updateCategoryCounters() {
            let countA = 0; // Intel & News
            let countB = 0; // Hazard & Damage
            let countC = 0; // Crime
            let countD = 0; // Transit
            let countE = 0; // High Security

            activeIncidents.forEach(m => {
                const c = String(m.category || "").toUpperCase();
                if (c.includes('PROTEST') || c.includes('NEWS') || c.includes('UNREST') || c.includes('INTEL')) countA++;
                else if (c.includes('DAMAGE') || c.includes('HAZARD')) countB++;
                else if (c.includes('CRIME')) countC++;
                else if (c.includes('TRANSIT')) countD++;
                else if (c.includes('SECURITY') || c.includes('TERROR')) countE++;
                else countA++; // Default fallback
            });
            
            document.getElementById('cA').textContent = countA;
            document.getElementById('cB').textContent = countB;
            document.getElementById('cC').textContent = countC;
            document.getElementById('cD').textContent = countD;
            document.getElementById('cE').textContent = countE;
        }

    </script>

    <div id="bottom-authority-bar">
        <div class="footer-logo-group">
            <img class="footer-logo-img" src="https://www.google.com/s2/favicons?domain=france24.com&sz=128" alt="FRANCE 24">
            <img class="footer-logo-img" src="https://www.google.com/s2/favicons?domain=leparisien.fr&sz=128" alt="LE PARISIEN">
        </div>
        <div class="footer-legal-text">
            SYSTEM DEPLOYMENT ACTIVE. MUNICIPAL REPORTING MANDATES. INTELLIGENCE REAL-TIME INGESTION.
        </div>
    </div>
</body>
</html>
