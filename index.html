<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Paris OSINT</title>
    
    <!-- Leaflet CSS for the map styling -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        .dashboard-header {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 4px solid #d32f2f;
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h2>Grey Lane | Live Paris OSINT</h2>
        <!-- This will start Yellow, turn Green on connect, or Red if it fails -->
        <p id="status-text" style="color: #ff9800; font-size: 14px; margin-top: -10px;">Backend: Waking up Render server...</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize Map
        const map = L.map('map').setView([48.8566, 2.3522], 13);

        // 2. Add Dark Theme
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Drop Test Pin
        L.marker([48.8584, 2.2945]).addTo(map)
            .bindPopup("<b>Test Intel:</b> Systems Online.")
            .openPopup();

        // 4. Connect WebSocket to Render
        const backendUrl = 'wss://grey-lane-osint-dashboard.onrender.com/ws';
        const ws = new WebSocket(backendUrl);

        ws.onopen = function() {
            console.log("Connected to Grey Lane Backend");
            document.getElementById('status-text').innerText = 'Backend: Live & Connected';
            document.getElementById('status-text').style.color = '#4caf50'; // Turns Green
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.event === 'new_incident') {
                const inc = data.incident;
                L.circleMarker([inc.lat, inc.lng], {
                    color: '#d32f2f',
                    fillColor: '#f44336',
                    fillOpacity: 0.8,
                    radius: 8
                }).addTo(map)
                  .bindPopup(`<b>${inc.category.toUpperCase()}</b><br>${inc.description}<br><small>Severity: ${inc.severity}</small>`)
                  .openPopup();
            }
        };

        ws.onclose = function() {
            console.log("Disconnected from backend");
            document.getElementById('status-text').innerText = 'Backend: Disconnected (Server Asleep)';
            document.getElementById('status-text').style.color = '#f44336'; // Turns Red
        };
    </script>
</body>
</html>
