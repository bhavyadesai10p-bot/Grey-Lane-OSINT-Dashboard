<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Live Paris OSINT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Tactical UI Overlay */
        .overlay-box {
            position: absolute;
            top: 20px;
            left: 50px;
            background: rgba(10, 10, 10, 0.85);
            border-left: 4px solid #ff0000;
            padding: 15px 20px;
            color: #fff;
            z-index: 1000;
            pointer-events: auto; /* Changed to auto so you can click the checkbox */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 2px;
        }

        .overlay-box h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .status {
            font-size: 14px;
            color: #00ff00;
            margin-top: 5px;
        }
        
        .control-panel {
            margin-top: 15px; 
            border-top: 1px solid #333; 
            padding-top: 12px;
        }

        /* --- THE NEW TACTICAL RADAR PINS --- */
        .osint-marker {
            border-radius: 50%;
            border: 2px solid white;
        }

        .severity-high {
            background-color: rgba(255, 0, 0, 0.8);
            box-shadow: 0 0 10px red;
            animation: pulse-high 1.2s infinite;
        }

        .severity-medium {
            background-color: rgba(255, 165, 0, 0.8);
            box-shadow: 0 0 10px orange;
            animation: pulse-medium 2s infinite;
        }

        .severity-low {
            background-color: rgba(0, 150, 255, 0.8);
            box-shadow: 0 0 10px #0096ff;
        }

        /* Animation Keyframes for the pulsing effect */
        @keyframes pulse-high {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        @keyframes pulse-medium {
            0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 165, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); }
        }

        /* Custom Popup & Tooltip Styling */
        .leaflet-popup-content-wrapper {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .leaflet-popup-tip {
            background: #111;
        }
        .transit-tooltip {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #444;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="overlay-box">
        <h1>Grey Lane | Paris OSINT</h1>
        <div class="status" id="status-text">Connecting to intelligence feed...</div>
        
        <div class="control-panel">
            <label style="cursor: pointer; display: flex; align-items: center; font-size: 13px; color: #aaa; transition: color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">
                <input type="checkbox" id="tog-transit" onchange="toggleTransit(this.checked)" style="margin-right: 10px; cursor: pointer;">
                [X] ENABLE TRANSIT GRID
            </label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize the Dark Map
        const map = L.map('map', {
            center: [48.8566, 2.3522], 
            zoom: 12,
            zoomControl: false
        });

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 19
        }).addTo(map);

        // --- NEW: TRANSIT OVERLAY DATA & LOGIC ---
        let transitLayer = L.layerGroup(); // Holds the lines so they don't mix with news dots

        const METRO_LINES = [
            {name: 'M1', color: '#F2C931', coords: [[48.872,2.284], [48.869,2.308], [48.863,2.332], [48.857,2.349], [48.848,2.396]]},
            {name: 'M4', color: '#A0006E', coords: [[48.891,2.343], [48.876,2.343], [48.858,2.349], [48.825,2.332]]},
            {name: 'M6', color: '#83C491', coords: [[48.845,2.282], [48.848,2.306], [48.851,2.330], [48.851,2.400]]},
            {name: 'M13', color: '#6EC4E8', coords: [[48.916,2.329], [48.903,2.338], [48.883,2.338], [48.860,2.332], [48.818,2.296]]},
            {name: 'RER A', color: '#D00000', coords: [[48.870,2.209], [48.865,2.287], [48.858,2.350], [48.850,2.440], [48.835,2.520]]},
            {name: 'RER B', color: '#4169E1', coords: [[48.944,2.357], [48.900,2.350], [48.860,2.347], [48.810,2.321], [48.760,2.310]]},
        ];

        function renderTransitLines() {
            transitLayer.clearLayers(); 
            METRO_LINES.forEach(line => {
                L.polyline(line.coords, { color: line.color, weight: 4, opacity: 0.85 })
                  .addTo(transitLayer)
                  .bindTooltip(line.name, { sticky: true, className: 'transit-tooltip' });
            });
        }

        function toggleTransit(isOn) {
            if (isOn) {
                renderTransitLines();
                map.addLayer(transitLayer);
            } else {
                map.removeLayer(transitLayer);
            }
        }
        // -----------------------------------------

        // 2. Connect to the Render Backend Pipe
        const wsUrl = "wss://grey-lane-osint-dashboard.onrender.com/ws";
        const ws = new WebSocket(wsUrl);
        const statusText = document.getElementById("status-text");

        ws.onopen = function() {
            statusText.innerHTML = "Backend: Live & Connected";
            statusText.style.color = "#00ff00"; // Green
        };

        ws.onclose = function() {
            statusText.innerHTML = "Backend: Disconnected (Reconnecting...)";
            statusText.style.color = "#ff0000"; // Red
        };

        // 3. Listen for Intelligence Data
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.event === "new_incident") {
                const inc = data.incident;
                
                // Determine the tactical styling based on Gemini's severity rating
                let severityClass = "severity-low"; 
                if (inc.severity.toLowerCase() === "high") severityClass = "severity-high";
                if (inc.severity.toLowerCase() === "medium") severityClass = "severity-medium";

                // Create the custom HTML radar pin
                const tacticalIcon = L.divIcon({
                    className: `osint-marker ${severityClass}`,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7] // Centers the dot exactly on the coordinate
                });

                // Drop the pin on the map
                const marker = L.marker([inc.lat, inc.lng], { icon: tacticalIcon }).addTo(map);
                
                // Format the popup box
                marker.bindPopup(`
                    <div style="font-family: Courier New, monospace;">
                        <strong style="color: #ff4444;">[ ${inc.category} ]</strong><br><br>
                        ${inc.description}<br><br>
                        <span style="color: #888;">Severity Assessment: ${inc.severity.toUpperCase()}</span>
                    </div>
                `);
            }
        };
    </script>
</body>
</html>
