<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Live Paris OSINT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
            cursor: crosshair; 
        }

        .overlay-box {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.85);
            border-left: 4px solid #ff0000;
            padding: 15px 20px;
            color: #fff;
            z-index: 1000;
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 2px;
        }

        .overlay-box h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .status {
            font-size: 14px;
            color: #00ff00;
            margin-top: 5px;
        }
        
        .control-panel, .route-panel {
            margin-top: 15px; 
            border-top: 1px solid #333; 
            padding-top: 12px;
        }

        .rte-input {
            width: 90%;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            margin-bottom: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .rte-input:focus { outline: none; }

        .btn-calc {
            width: 96%;
            background: #0055ff;
            border: 1px solid #0096ff;
            color: #fff;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-calc:hover { background: #0096ff; }

        #rte-result {
            margin-top: 10px;
            font-size: 12px;
            display: none;
            padding: 10px;
            line-height: 1.4;
        }

        .log-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: calc(100vh - 40px);
            background: rgba(10, 10, 10, 0.85);
            border-right: 4px solid #00d4ff;
            color: #fff;
            z-index: 1000;
            pointer-events: auto;
            box-shadow: -4px 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .log-header {
            padding: 15px;
            background: #111;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00d4ff;
            text-align: right;
        }

        .log-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-content::-webkit-scrollbar { width: 4px; }
        .log-content::-webkit-scrollbar-track { background: #000; }
        .log-content::-webkit-scrollbar-thumb { background: #444; }

        .log-entry {
            background: #1a1a1a;
            border-left: 3px solid;
            padding: 10px;
            font-size: 11px;
            line-height: 1.4;
            cursor: pointer;
            animation: slideIn 0.3s ease-out;
            transition: background 0.2s;
        }
        .log-entry:hover { background: #2a2a2a; }

        .log-entry.high { border-color: #ff0000; color: #ffdddd; }
        .log-entry.medium { border-color: #ffa500; color: #ffeedd; }
        .log-entry.low { border-color: #0096ff; color: #ddf0ff; }
        
        .log-time {
            font-size: 9px;
            color: #888;
            margin-bottom: 5px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .osint-marker { border-radius: 50%; border: 2px solid white; }
        .severity-high { background-color: rgba(255, 0, 0, 0.8); box-shadow: 0 0 10px red; animation: pulse-high 1.2s infinite; }
        .severity-medium { background-color: rgba(255, 165, 0, 0.8); box-shadow: 0 0 10px orange; animation: pulse-medium 2s infinite; }
        .severity-low { background-color: rgba(0, 150, 255, 0.8); box-shadow: 0 0 10px #0096ff; }

        @keyframes pulse-high { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
        @keyframes pulse-medium { 0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 165, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); } }

        .leaflet-popup-content-wrapper { background: #111; color: #fff; border: 1px solid #333; }
        .leaflet-popup-tip { background: #111; }
        .transit-tooltip { background: rgba(10, 10, 10, 0.9); border: 1px solid #444; color: #fff; font-family: monospace; font-weight: bold; }
        
        /* --- TACTICAL STATION TOOLTIPS --- */
        .tactical-station-tooltip {
            background-color: #111 !important;
            color: #00d2ff !important;
            border: 1px solid #00d2ff !important;
            font-family: monospace !important;
            font-size: 10px !important;
            border-radius: 2px !important;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.3) !important;
            padding: 4px 6px !important;
        }
        /* Hide the little triangle arrow Leaflet puts on tooltips */
        .leaflet-tooltip-top.tactical-station-tooltip::before {
            display: none !important;
        }

        #btn-transit-toggle {
            background: #111; 
            color: #00d2ff; 
            border: 1px solid #00d2ff; 
            padding: 6px 12px; 
            font-family: monospace; 
            font-size: 12px; 
            cursor: pointer; 
            border-radius: 3px; 
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        #btn-transit-toggle:hover {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 10px #00d2ff;
        }

        #btn-transit-toggle.active {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 15px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="overlay-box">
        <h1>Grey Lane | Paris OSINT</h1>
        <div class="status" id="status-text">Connecting to intelligence feed...</div>
        
<div class="control-panel">
    <label style="cursor: pointer; display: flex; align-items: center; font-size: 13px; color: #aaa; margin-bottom: 5px;">
        <input type="checkbox" id="tog-transit" onchange="toggleTransit()" checked style="margin-right: 10px;">
        [X] ENABLE TRANSIT GRID
    </label>
    <!-- NEW HEATMAP TOGGLE -->
    <label style="cursor: pointer; display: flex; align-items: center; font-size: 13px; color: #ff4444;">
        <input type="checkbox" id="tog-heatmap" onchange="toggleHeatmap(this.checked)" style="margin-right: 10px;">
        [X] SHOW CHRONIC THREAT ZONES
    </label>
</div>

        <div class="route-panel">
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">ROUTE SAFETY ENGINE</div>
            <input type="text" id="rte-from" class="rte-input" placeholder="Origin (Click Map)" readonly style="border-color: #00d4ff;">
            <input type="text" id="rte-to" class="rte-input" placeholder="Destination (Click Map)" readonly>
            <button class="btn-calc" onclick="calculateRoute()">▶ RUN THREAT SCAN</button>
            <div id="rte-result"></div>
        </div>
    </div>

    <div class="log-panel">
        <div class="log-header">▶ LIVE INTELLIGENCE LOG</div>
        <div class="log-content" id="log-content"></div>
    </div>

    <div id="map"></div>

    <div style="position: absolute; top: 20px; left: 370px; z-index: 1000;">
        <button id="btn-transit-toggle" onclick="toggleTransit()" class="active">
            [ TRANSIT: ON ]
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <script>
        const map = L.map('map', {
            center: [48.8566, 2.3522], 
            zoom: 13,
            zoomControl: false
        });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // --- TACTICAL DATA LAYERS ---
        const transitLayer = L.layerGroup().addTo(map);
        let isTransitVisible = true;

        // The Master Switch Function
        function toggleTransit() {
            const btn = document.getElementById('btn-transit-toggle');
            const checkbox = document.getElementById('tog-transit');
            if (isTransitVisible) {
                map.removeLayer(transitLayer);
                btn.style.color = "#555";
                btn.style.borderColor = "#555";
                btn.innerText = "[ TRANSIT: OFF ]";
                checkbox.checked = false;
                isTransitVisible = false;
            } else {
                map.addLayer(transitLayer);
                btn.style.color = "#00d2ff";
                btn.style.borderColor = "#00d2ff";
                btn.innerText = "[ TRANSIT: ON ]";
                checkbox.checked = true;
                isTransitVisible = true;
            }
        } 

        // --- 🚇 OFFICIAL PARIS RAIL NETWORK (IDFM OPEN DATA) ---
        fetch('https://data.iledefrance-mobilites.fr/api/explore/v2.1/catalog/datasets/traces-du-reseau-ferre-idf/exports/geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        // IDFM often provides the official hex color. If missing, default to a dark tactical grey.
                        let props = feature.properties;
                        let rawColor = props.colourweb_hexa || props.couleur_hexa || props.route_color || '333333'; 
                        let cleanColor = rawColor.replace('#', ''); // Ensure no double hash
                        
                        return {
                            color: `#${cleanColor}`,
                            weight: 2,
                            opacity: 0.4 // Kept dim so your glowing blue alerts stand out on top!
                        };
                    }
                }).addTo(transitLayer); // This attaches the entire grid to your [TRANSIT: ON/OFF] button!
            })
            .catch(error => console.error("Geospatial routing error:", error));

        // --- 🚉 OFFICIAL PARIS STATIONS (IDFM OPEN DATA) ---
        fetch('https://data.iledefrance-mobilites.fr/api/explore/v2.1/catalog/datasets/gares-et-stations-du-reseau-ferre-d-ile-de-france/exports/geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // pointToLayer tells Leaflet how to draw point data (stations)
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 4.5,          // Nearly doubled the size for clear visibility
                            fillColor: "#111111", // Dark center makes it a sleek hollow ring
                            color: "#ffffff",     // Bright white border to pop against the dark map
                            weight: 1.5,          // Slightly thicker line
                            opacity: 1,
                            fillOpacity: 1
                        });
                    },
                    // onEachFeature attaches the name tooltip to every single station
                    onEachFeature: function (feature, layer) {
                        // IDFM stores the name in 'nom_long' or 'nom_gare'
                        let stationName = feature.properties.nom_long || feature.properties.nom_gare || "Station";
                        layer.bindTooltip(`[ ${stationName} ]`, {
                            direction: 'top',
                            className: 'tactical-station-tooltip',
                            opacity: 0.9
                        });
                    }
                }).addTo(transitLayer); // Attaches to your Master Switch!
            })
            .catch(error => console.error("Station loading error:", error));


        // --- CHRONIC RED ZONE HEATMAP (Pickpockets, Scams, High-Theft) ---
        // Format: [Latitude, Longitude, Intensity 0.0 to 1.0]
        const parisRedZones = [
            [48.8809, 2.3553, 1.0], // Gare du Nord (Aggressive pickpocketing)
            [48.8867, 2.3431, 0.9], // Sacré-Cœur/Montmartre (String bracelet scam, pickpockets)
            [48.8584, 2.2945, 0.85], // Eiffel Tower Base (Distraction theft)
            [48.8606, 2.3376, 0.8], // Louvre Museum entry points (Professional rings)
            [48.8625, 2.3475, 0.75], // Châtelet-Les Halles underground (Muggings, transit theft)
            [48.8708, 2.3051, 0.7], // Champs-Élysées (Luxury theft, distraction)
            [48.8768, 2.3592, 0.65], // Gare de l'Est (Luggage theft)
            [48.8529, 2.3500, 0.6]  // Notre Dame area (Tourist distraction)
        ];

        // Create the heat layer with tactical visual settings
        const threatHeatLayer = L.heatLayer(parisRedZones, {
            radius: 35,
            blur: 25,
            maxZoom: 15,
            gradient: {0.4: '#ffed4a', 0.65: '#fa8231', 1.0: '#eb3b5a'} // Tactical Yellow -> Orange -> Red
        });

        function toggleHeatmap(isOn) {
            if (isOn) {
                map.addLayer(threatHeatLayer);
            } else {
                map.removeLayer(threatHeatLayer);
            }
        }

        let activeIncidents = []; 
        let routeLayer = L.layerGroup().addTo(map);
        let inputMode = 'from', coordFrom = null, coordTo = null;

        map.on('click', function(e) {
            const ll = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            if (inputMode === 'from') {
                coordFrom = [e.latlng.lat, e.latlng.lng];
                document.getElementById('rte-from').value = "🎯 " + ll;
                inputMode = 'to';
                document.getElementById('rte-from').style.borderColor = '#444';
                document.getElementById('rte-to').style.borderColor = '#00d4ff';
            } else if (inputMode === 'to') {
                coordTo = [e.latlng.lat, e.latlng.lng];
                document.getElementById('rte-to').value = "🎯 " + ll;
                inputMode = null;
                document.getElementById('rte-to').style.borderColor = '#444';
            }
        });

        document.getElementById('rte-from').onclick = () => { inputMode = 'from'; document.getElementById('rte-from').style.borderColor = '#00d4ff'; document.getElementById('rte-to').style.borderColor = '#444'; };
        document.getElementById('rte-to').onclick = () => { inputMode = 'to'; document.getElementById('rte-to').style.borderColor = '#00d4ff'; document.getElementById('rte-from').style.borderColor = '#444'; };

        async function calculateRoute() {
            if (!coordFrom || !coordTo) {
                alert("OSINT SYSTEM: Please click on the map twice to set an Origin and Destination.");
                return;
            }
            routeLayer.clearLayers();
            const resBox = document.getElementById('rte-result');
            resBox.style.display = 'block';
            resBox.style.background = '#222';
            resBox.style.border = '1px solid #444';
            resBox.style.color = '#fff';
            resBox.innerHTML = '⏳ Satellite calculating street route...';
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${coordFrom[1]},${coordFrom[0]};${coordTo[1]},${coordTo[0]}?overview=full&geometries=geojson`;
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.code !== 'Ok') {
                    resBox.innerHTML = '❌ ROUTE FAILED: Cannot find valid street path.';
                    return;
                }
                const routeGeoJSON = data.routes[0].geometry;
                const realRouteLine = L.geoJSON(routeGeoJSON, {
                    style: { color: '#00d4ff', weight: 4, opacity: 0.8 }
                }).addTo(routeLayer);
                L.circleMarker(coordFrom, {radius: 6, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.8}).addTo(routeLayer);
                L.circleMarker(coordTo, {radius: 6, color: '#ff4757', fillColor: '#ff4757', fillOpacity: 0.8}).addTo(routeLayer);
                map.fitBounds(realRouteLine.getBounds(), {padding: [50, 50]});
                const dangerZone = realRouteLine.getBounds().pad(0.015);
                const threatsOnRoute = activeIncidents.filter(h => dangerZone.contains([h.lat, h.lng]));
                if (threatsOnRoute.length === 0) {
                    resBox.style.background = 'rgba(0, 255, 0, 0.1)';
                    resBox.style.border = '1px solid #00ff00';
                    resBox.style.color = '#00ff00';
                    resBox.innerHTML = '✓ PATH CLEAR.<br>No live threats detected on this street route.';
                } else {
                    resBox.style.background = 'rgba(255, 0, 0, 0.1)';
                    resBox.style.border = '1px solid #ff4757';
                    resBox.style.color = '#ff4757';
                    resBox.innerHTML = `⚠ WARNING: <b>${threatsOnRoute.length} hazard(s)</b> detected intersecting your street path.`;
                    threatsOnRoute.forEach(threat => {
                        L.circle([threat.lat, threat.lng], {radius: 300, color: '#ff0000', fillOpacity: 0.2, weight: 1})
                        .addTo(routeLayer)
                        .bindTooltip("THREAT RADIUS", {permanent: false});
                    });
                }
            } catch (error) {
                resBox.innerHTML = '❌ SATELLITE OFFLINE: Routing engine unreachable.';
            }
        }

        const wsUrl = "wss://grey-lane-osint-dashboard.onrender.com/ws";
        const ws = new WebSocket(wsUrl);
        const statusText = document.getElementById("status-text");
        const logContent = document.getElementById("log-content");

        ws.onopen = function() { statusText.innerHTML = "Backend: Live & Connected"; statusText.style.color = "#00ff00"; };
        ws.onclose = function() { statusText.innerHTML = "Backend: Disconnected (Reconnecting...)"; statusText.style.color = "#ff0000"; };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.event === "new_incident") {
                const inc = data.incident;
                activeIncidents.push(inc);
                if(activeIncidents.length > 50) activeIncidents.shift(); 
                let sevClass = inc.severity.toLowerCase() === "high" ? "severity-high" : (inc.severity.toLowerCase() === "medium" ? "severity-medium" : "severity-low");
                // --- CUSTOM TACTICAL STYLING ENGINE ---
                let customClass = `osint-marker ${sevClass}`;
                let mSize = 14;
                let customHtml = '';
                let isTransit = false;
                // Sleek, Mock-Style Transit Dots (No yellow blobs)
                if (inc.category === 'TRANSIT') {
                    isTransit = true;
                    mSize = 12; // Sleek and sharp footprint
                    // A clean, glowing cyan ring, like a radar blip for infrastructure
                    customHtml = '<div style="width: 100%; height: 100%; background: rgba(0, 210, 255, 0.2); border: 1.5px solid #00d2ff; border-radius: 50%; box-shadow: 0 0 5px #00d2ff;"></div>';
                }
                // Create the marker
                const marker = L.marker([inc.lat, inc.lng], { 
                    icon: L.divIcon({
                        className: customClass, 
                        html: customHtml,
                        iconSize: [mSize, mSize], 
                        iconAnchor: [mSize/2, mSize/2]
                    }) 
                });
                // Assign to the correct layer!
                if (isTransit) {
                    marker.addTo(transitLayer);
                } else {
                    marker.addTo(map);
                }
                marker.bindPopup(`<div style="font-family: monospace;"><strong style="color: #ff4444;">[ ${inc.category} ]</strong><br><br>${inc.description}</div>`);
                
                // --- THE TACTICAL IMPACT RADIUS ---
                marker.on('click', () => {
                    // 1. Erase the previous impact zone if one exists
                    if (window.activeImpactZone) {
                        map.removeLayer(window.activeImpactZone);
                    }
                    
                    // 2. Determine the color (Cyan for transit, Severity color for news/crime)
                    let zoneColor = isTransit ? '#00d2ff' : (inc.severity.toLowerCase() === "high" ? "#ff4444" : "#ffcc00");
                    
                    // 3. Draw a 500-meter tactical ring
                    window.activeImpactZone = L.circle([inc.lat, inc.lng], {
                        radius: 500, // 500 meters
                        color: zoneColor,
                        weight: 2,
                        dashArray: "5, 8", // Creates a military-style dashed border
                        fillColor: zoneColor,
                        fillOpacity: 0.1
                    }).addTo(map);
                });

                const timeString = new Date().toLocaleTimeString([], { hour12: false });
                const shortDesc = inc.description.split('<br><br>')[0].replace('<b>', '').replace('</b>', '');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${inc.severity.toLowerCase()}`;
                logEntry.innerHTML = `
                    <div class="log-time">[${timeString}] SYSTEM DROP</div>
                    <strong style="color: #fff;">[ ${inc.category} ]</strong><br>
                    ${shortDesc}
                `;
                logEntry.onclick = () => {
                    // Zoom out slightly to zoom level 15 so we can see the whole 500m radius
                    map.flyTo([inc.lat, inc.lng], 15, { animate: true, duration: 1.5 });
                    marker.openPopup();
                    marker.fire('click'); // This fires the impact radius we just built!
                };
                logContent.prepend(logEntry);
                if (logContent.children.length > 50) logContent.removeChild(logContent.lastChild);
            }
        };
    </script>
</body>
</html>
