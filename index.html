<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Lane | Paris OSINT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* This makes sure the map takes up the whole screen */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212; /* Dark theme background */
            color: #ffffff;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        /* A simple overlay for the dashboard title */
        .dashboard-header {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 4px solid #d32f2f; /* Red accent */
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h2>Grey Lane | Live Paris OSINT</h2>
        <p id="status-text" style="color: #4caf50; font-size: 14px; margin-top: -10px;">Backend: Disconnected</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
<script>
        // 1. Initialize the map and center it on Paris [Latitude, Longitude]
        const map = L.map('map').setView([48.8566, 2.3522], 13);

        // 2. Add the completely free OpenStreetMap tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Just dropping a test pin on the Eiffel Tower so we know it works!
        L.marker([48.8584, 2.2945]).addTo(map)
            .bindPopup("<b>Test Intel:</b> Systems Online.")
            .openPopup();

        // 3. Connect to the Render AI Backend via WebSockets
        // IMPORTANT: Change this URL to your actual Render URL, and make sure it starts with wss://
        const backendUrl = const backendUrl = 'wss://grey-lane-osint-dashboard.onrender.com/ws';
        const ws = new WebSocket(backendUrl);

        ws.onopen = function() {
            console.log("Connected to Grey Lane Backend");
            document.getElementById('status-text').innerText = 'Backend: Live & Connected';
            document.getElementById('status-text').style.color = '#4caf50'; // Green
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.event === 'new_incident') {
                const inc = data.incident;
                
                // Create a red circle marker for new incidents
                L.circleMarker([inc.lat, inc.lng], {
                    color: '#d32f2f', // Red alert border
                    fillColor: '#f44336', // Red fill
                    fillOpacity: 0.8,
                    radius: 8
                }).addTo(map)
                  .bindPopup(`<b>${inc.category.toUpperCase()}</b><br>${inc.description}<br><small>Severity: ${inc.severity}</small>`)
                  .openPopup();
            }
        };

        ws.onclose = function() {
            console.log("Disconnected from backend");
            document.getElementById('status-text').innerText = 'Backend: Disconnected (Retrying...)';
            document.getElementById('status-text').style.color = '#f44336'; // Red
        };
    </script>
</body>
</html>
